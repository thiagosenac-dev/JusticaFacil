<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - Justiça Fácil</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body.login-page {
            background-color: var(--brand-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-hover);
            text-align: center;
        }

        .login-logo {
            font-size: 1.5rem;
            color: var(--brand-dark);
            font-family: 'Merriweather', serif;
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
        }

        .btn-full {
            width: 100%;
            margin-top: 1rem;
        }

        .error-msg {
            color: red;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body class="login-page">

    <div class="login-card">
        <div class="login-logo">
            <i class="ph ph-scales" style="color: var(--brand-blue);"></i> Justiça Fácil
        </div>

        <form onsubmit="event.preventDefault(); fazerLogin();">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="admin@jusfacil.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="••••••" required>
            </div>
            <button type="submit" class="search-box button btn-full"
                style="background: var(--brand-blue); color: white; border: none; padding: 0.8rem; border-radius: 50px; cursor: pointer; justify-content: center;">Entrar</button>
            <p id="errorMsg" class="error-msg">Usuário ou senha incorretos.</p>
        </form>

        <p style="margin-top: 1.5rem; font-size: 0.85rem; color: #94a3b8;">
            <a href="index.html">← Voltar para o site</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
